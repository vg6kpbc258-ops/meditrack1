function getDaysAgo(n){
  const d=new Date();d.setDate(d.getDate()-n);
  return d.toISOString().slice(0,10);
}
function getDateStr(d){return (d||new Date()).toISOString().slice(0,10);}

}

function buildSampleDoses(meds){
  const doses=[];
  for(let d=0;d<30;d++){
    const dateStr=getDaysAgo(29-d);
    meds.forEach(med=>{
      med.schedule.forEach((time,idx)=>{
        const id=`dose_${med.id}_${dateStr}_${idx}`;
        const scheduledAt=`${dateStr}T${time}:00`;
        const rand=Math.random();
        let taken=rand>0.15;
        if(d===0&&rand>0.3)taken=true;
        doses.push({
          id,medicationId:med.id,patientId:med.patientId,
          scheduledAt,takenAt:taken?scheduledAt:null,skipped:!taken&&rand<0.05,note:null
        });
      });
    });
  }
  return doses;
}

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}

function calcAdherence(doses,date){
  const dayDoses=doses.filter(d=>d.scheduledAt.startsWith(date));
  if(!dayDoses.length)return null;
  const taken=dayDoses.filter(d=>d.takenAt).length;
  return Math.round((taken/dayDoses.length)*100);
}

function getAdherenceColor(pct){
  if(pct===null)return 'gray';
  if(pct===100)return 'green';
  if(pct>0)return 'yellow';
  return 'red';
}

function getAdherenceColorClass(pct){
  if(pct===null)return 'bg-gray-200 text-gray-400';
  if(pct===100)return 'bg-green-500 text-white';
  if(pct>0)return 'bg-yellow-400 text-white';
  return 'bg-red-500 text-white';
}

function calcStreak(doses,patientId){
  let streak=0;
  const today=new Date();
  for(let i=0;i<365;i++){
    const d=new Date(today);d.setDate(d.getDate()-i);
    const ds=getDateStr(d);
    const pct=calcAdherence(doses.filter(x=>x.patientId===patientId),ds);
    if(pct===100)streak++;
    else if(pct!==null)break;
    else if(i>0)break;
  }
  return streak;
}

function calcPoints(doses,patientId){
  const myDoses=doses.filter(d=>d.patientId===patientId);
  const dates=[...new Set(myDoses.map(d=>d.scheduledAt.slice(0,10)))];
  let pts=0;
  dates.forEach(date=>{
    const pct=calcAdherence(myDoses,date);
    if(pct===100)pts+=10;
    else if(pct>0)pts+=3;
  });
  return pts;
}

function getGreeting(lang){
  const h=new Date().getHours();
  const t=TR[lang];
  if(h<12)return t.goodMorning;
  if(h<17)return t.goodAfternoon;
  return t.goodEvening;
}

function getLast7Days(){
  return Array.from({length:7},(_,i)=>{const d=new Date();d.setDate(d.getDate()-(6-i));return getDateStr(d);});
}
function getLast4Weeks(){
  const weeks=[];
  for(let w=3;w>=0;w--){
    const days=[];
    for(let d=6;d>=0;d--){const dd=new Date();dd.setDate(dd.getDate()-(w*7+d));days.push(getDateStr(dd));}
    weeks.push(days);
  }
  return weeks;
}

function formatTime(timeStr){
  if(!timeStr)return '';
  const [h,m]=timeStr.split(':');
  const hour=parseInt(h);
  const ampm=hour<12?'ص':'م';
  const h12=hour%12||12;
  return `${h12}:${m} ${ampm}`;
}

function getDaysInMonth(year,month){return new Date(year,month+1,0).getDate();}
function getFirstDayOfMonth(year,month){return new Date(year,month,1).getDay();}

// ─── STATE ──────────────────────────────────────────────────
function reducer(state,action){
  switch(action.type){
    case 'LOGIN':return{...state,currentUser:action.user};
    case 'LOGOUT':return{...state,currentUser:null,page:'login'};
    case 'SET_PAGE':return{...state,page:action.page,pageParam:action.param||null};
    case 'SET_LANG':{
      const html=document.getElementById('html-root');
      html.setAttribute('lang',action.lang);
      html.setAttribute('dir',action.lang==='ar'?'rtl':'ltr');
      return{...state,language:action.lang};
    }
    case 'SET_DARK':{
      const body=document.getElementById('app-body');
      if(action.val)body.classList.add('dark-mode');
      else body.classList.remove('dark-mode');
      return{...state,darkMode:action.val};
    }
    case 'SHOW_TOAST':return{...state,toast:{msg:action.msg,kind:action.kind||'success'}};
    case 'HIDE_TOAST':return{...state,toast:null};
    case 'ADD_PATIENT':return{...state,patients:[...state.patients,action.patient]};
    case 'UPDATE_PATIENT':return{...state,
      patients:state.patients.map(p=>p.id===action.id?{...p,...action.updates}:p),
      currentUser:state.currentUser?.id===action.id?{...state.currentUser,...action.updates}:state.currentUser
    };
    case 'ADD_MED':return{...state,medications:[...state.medications,action.med]};
    case 'UPDATE_MED':return{...state,medications:state.medications.map(m=>m.id===action.id?{...m,...action.updates}:m)};
    case 'DELETE_MED':return{...state,
      medications:state.medications.filter(m=>m.id!==action.id),
      doses:state.doses.filter(d=>d.medicationId!==action.id)
    };
    case 'LOG_DOSE':return{...state,
      doses:state.doses.map(d=>d.id===action.id?{...d,takenAt:nowISO(),skipped:false}:d)
    };
    case 'SKIP_DOSE':return{...state,
      doses:state.doses.map(d=>d.id===action.id?{...d,takenAt:null,skipped:true}:d)
    };
    case 'ADD_DOSE':return{...state,doses:[...state.doses,action.dose]};
    case 'ADD_DOSES':return{...state,doses:[...state.doses,...action.doses]};
    case 'ADD_HEALTH':return{...state,healthData:[...state.healthData,action.data]};
    default:return state;
  }
}

function loadState(){
  try{
    const s=localStorage.getItem('meditrack_v2');
    if(s)return JSON.parse(s);
  }catch(e){}
  return INIT_STATE;

  const [state,dispatch]=useReducer(reducer,null,loadState);
  useEffect(()=>{
    localStorage.setItem('meditrack_v2',JSON.stringify(state));
  },[state]);
  useEffect(()=>{
    if(state.darkMode){document.getElementById('app-body').classList.add('dark-mode');}
    const html=document.getElementById('html-root');
    html.setAttribute('lang',state.language);
    html.setAttribute('dir',state.language==='ar'?'rtl':'ltr');
  },[]);
  return <AppCtx.Provider value={{state,dispatch}}>{children}</AppCtx.Provider>;
}

// ─── ENSURE TODAY DOSES ────────────────────────────────────
function useEnsureTodayDoses(){
  const {state,dispatch}=useApp();
  useEffect(()=>{
    if(!state.currentUser||state.currentUser.role!=='patient')return;
    const today=getDateStr();
    const myMeds=state.medications.filter(m=>m.patientId===state.currentUser.id);
    const newDoses=[];
    myMeds.forEach(med=>{
      if(today<med.startDate||today>med.endDate)return;
      med.schedule.forEach((time,idx)=>{
        const id=`dose_${med.id}_${today}_${idx}`;
        if(!state.doses.find(d=>d.id===id)){
          newDoses.push({id,medicationId:med.id,patientId:state.currentUser.id,
            scheduledAt:`${today}T${time}:00`,takenAt:null,skipped:false,note:null});
        }
      });
    });
    if(newDoses.length)dispatch({type:'ADD_DOSES',doses:newDoses});
  },[state.currentUser?.id,state.medications.length]);
}

function Toast(){
  const {state,dispatch}=useApp();
  useEffect(()=>{
    if(state.toast){const t=setTimeout(()=>dispatch({type:'HIDE_TOAST'}),3000);return()=>clearTimeout(t);}
  },[state.toast]);
  if(!state.toast)return null;
  const colors={success:'bg-green-500',error:'bg-red-500',warning:'bg-yellow-500',info:'bg-blue-500'};
  return(
    <div className={`toast text-white px-6 py-3 rounded-xl shadow-lg text-sm font-semibold ${colors[state.toast.kind]||'bg-green-500'}`}>
      {state.toast.msg}
    </div>
  );
}

function Btn({children,onClick,variant='primary',size='md',disabled,className='',type='button'}){
  const base='font-semibold rounded-xl transition-all duration-200 active:scale-95 ';
  const sizes={sm:'px-3 py-1.5 text-sm',md:'px-5 py-2.5 text-sm',lg:'px-6 py-3 text-base'};
  const variants={
    primary:'bg-indigo-500 hover:bg-indigo-600 text-white shadow-sm',
    success:'bg-green-500 hover:bg-green-600 text-white shadow-sm',
    danger:'bg-red-500 hover:bg-red-600 text-white shadow-sm',
    outline:'border-2 border-indigo-500 text-indigo-600 hover:bg-indigo-50',
    ghost:'text-gray-600 hover:bg-gray-100',
    warning:'bg-yellow-400 hover:bg-yellow-500 text-white',
  };
  return(
    <button type={type} onClick={onClick} disabled={disabled}
      className={`${base}${sizes[size]||sizes.md} ${variants[variant]||variants.primary} ${disabled?'opacity-50 cursor-not-allowed':''} ${className}`}>
      {children}
    </button>
  );
}

function MedForm({open,onClose,existing}){
  const {state,dispatch}=useApp();
  const t=useT();
  const today=getDateStr();
  const in60=getDateStr(new Date(Date.now()+60*86400000));
  const EMPTY={name:'',dosage:'',timesPerDay:1,schedule:['08:00'],startDate:today,endDate:in60,
    notes:'',importance:'',risks:'',reminderEnabled:true,color:MED_COLORS[0],image:null};
  const [form,setForm]=useState(existing||EMPTY);
  useEffect(()=>{setForm(existing||EMPTY);},[existing]);
  const set=k=>v=>setForm(f=>({...f,[k]:v}));

  const setScheduleTime=(i,v)=>setForm(f=>{
    const s=[...f.schedule];s[i]=v;return{...f,schedule:s};
  });
  const handleTimesChange=n=>{
    const num=parseInt(n)||1;
    const defaults=['08:00','13:00','18:00','22:00'];
    const sched=Array.from({length:num},(_,i)=>form.schedule[i]||defaults[i]||'08:00');
    setForm(f=>({...f,timesPerDay:num,schedule:sched}));
  };

  const submit=e=>{
    e.preventDefault();
    if(existing){
      dispatch({type:'UPDATE_MED',id:existing.id,updates:form});
      dispatch({type:'SHOW_TOAST',msg:t.medicationUpdated});
    } else {
      const med={...form,id:uid(),patientId:state.currentUser.id};
      dispatch({type:'ADD_MED',med});
      dispatch({type:'SHOW_TOAST',msg:t.medicationAdded});
    }
    onClose();
  };

  return(
    <Modal open={open} onClose={onClose} title={existing?t.editMedication:t.addMedication} wide>
      <form onSubmit={submit} className="flex flex-col gap-4">
        <div className="grid grid-cols-2 gap-3">
          <Input label={t.medName} value={form.name} onChange={set('name')} required className="col-span-2"/>
          <Input label={t.dosage} value={form.dosage} onChange={set('dosage')} placeholder="مثال: 500mg" required/>
          <Select label={t.timesPerDay} value={form.timesPerDay} onChange={handleTimesChange}
            options={[1,2,3,4].map(n=>({value:n,label:`${n} ${n===1?'مرة':'مرات'}`}))}/>
        </div>

        <div>
          <label className="text-sm font-semibold text-gray-700 block mb-2">{t.scheduleTime}</label>
          <div className="flex flex-wrap gap-2">
            {form.schedule.map((time,i)=>(
              <div key={i} className="flex items-center gap-1">
                <span className="text-xs text-gray-500">{i+1}.</span>
                <input type="time" value={time} onChange={e=>setScheduleTime(i,e.target.value)}
                  className="border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400"/>
              </div>
            ))}
          </div>
        </div>

        <div className="grid grid-cols-2 gap-3">
          <Input label={t.startDate} value={form.startDate} onChange={set('startDate')} type="date"/>
          <Input label={t.endDate} value={form.endDate} onChange={set('endDate')} type="date"/>
        </div>

        <div>
          <label className="text-sm font-semibold text-gray-700 block mb-2">{t.medColor}</label>
          <div className="flex gap-2 flex-wrap">
            {MED_COLORS.map(c=>(
              <button key={c} type="button" onClick={()=>set('color')(c)}
                className={`w-7 h-7 rounded-full transition-transform ${form.color===c?'scale-125 ring-2 ring-offset-2 ring-gray-400':''}`}
                style={{background:c}}/>
            ))}
          </div>
        </div>

        <div>
          <label className="text-sm font-semibold text-gray-700 block mb-2">{t.photo}</label>
          <div className="flex items-center gap-3">
            {form.image?(
              <div className="relative">
                <img src={form.image} alt="صورة الدواء"
                  className="w-16 h-16 rounded-xl object-cover border-2 shadow-sm"
                  style={{borderColor:form.color}}/>
                <button type="button" onClick={()=>set('image')(null)}
                  className="absolute -top-1.5 -end-1.5 w-5 h-5 bg-red-500 text-white rounded-full text-xs flex items-center justify-center shadow hover:bg-red-600">×</button>
              </div>
            ):(
              <div className="w-16 h-16 rounded-xl border-2 border-dashed border-gray-300 flex items-center justify-center text-2xl bg-gray-50">
                💊

                <span>📷</span> {t.uploadPhoto}

              <input type="file" accept="image/*" className="hidden"

                  const file=e.target.files[0];
                  if(!file)return;
                  const reader=new FileReader();
                  reader.onload=ev=>set('image')(ev.target.result);
                  reader.readAsDataURL(file);

function AIInsightsCard(){
  const {state}=useApp();
  const t=useT();
  const myDoses=state.doses.filter(d=>d.patientId===state.currentUser?.id);
  const insights=useMemo(()=>{
    const result=[];
    if(!myDoses.length)return result;
    // Find most missed time
    const byTime={};
    myDoses.filter(d=>!d.takenAt).forEach(d=>{
      const time=d.scheduledAt.slice(11,16);
      byTime[time]=(byTime[time]||0)+1;
    });
    const missedTime=Object.entries(byTime).sort((a,b)=>b[1]-a[1])[0];
    if(missedTime&&missedTime[1]>2)
      result.push(`غالبًا تفوّت جرعة ${formatTime(missedTime[0])} 🕐`);
    // Find best days
    const byDay={};
    myDoses.filter(d=>d.takenAt).forEach(d=>{
      const day=new Date(d.scheduledAt).getDay();
      byDay[day]=(byDay[day]||0)+1;
    });
    const bestDay=Object.entries(byDay).sort((a,b)=>b[1]-a[1])[0];
    if(bestDay)
      result.push(`أفضل أيامك: ${t.weekdays[parseInt(bestDay[0])]} 📈`);
    // Overall stats
    const totalTaken=myDoses.filter(d=>d.takenAt).length;
    const totalScheduled=myDoses.length;
    if(totalScheduled>0){
      const overall=Math.round((totalTaken/totalScheduled)*100);
      if(overall>=80)result.push(`الالتزام الكلي ممتاز: ${overall}% 🌟`);
      else if(overall>=50)result.push(`الالتزام الكلي جيد: ${overall}% - يمكن تحسينه 💪`);
      else result.push(`الالتزام الكلي ${overall}% - حاول الالتزام أكثر ⚠️`);
    }
    return result;
  },[myDoses.length]);

  if(!insights.length)return null;
  return(
    <Card className="p-4 mb-5 bg-purple-50 border-purple-100">
      <h3 className="font-bold text-purple-700 mb-3 text-sm">{t.aiInsights}</h3>
      <ul className="flex flex-col gap-2">
        {insights.map((ins,i)=>(
          <li key={i} className="text-sm text-purple-600 flex items-start gap-2">
            <span className="mt-0.5">•</span>{ins}
          </li>
        ))}
      </ul>
    </Card>
  );
}

        </select>
      </div>

      {/* Calendar */}
      <Card className="p-4 mb-5">
        <div className="flex items-center justify-between mb-4">
          <button onClick={goMonthBack} className="p-2 hover:bg-gray-100 rounded-lg text-gray-600">←</button>
          <h3 className="font-bold text-gray-800">{t.months[month]} {year}</h3>
          <button onClick={goMonthNext} className="p-2 hover:bg-gray-100 rounded-lg text-gray-600">→</button>
        </div>
        {/* Weekday headers */}
        <div className="grid grid-cols-7 mb-2">
          {t.weekdays.map(d=>(
            <div key={d} className="text-center text-xs text-gray-400 font-semibold py-1">{d}</div>
          ))}
        </div>
        {/* Days grid */}
        <div className="grid grid-cols-7 gap-1">
          {Array.from({length:firstDay}).map((_,i)=><div key={`e${i}`}/>)}
          {Array.from({length:daysInMonth},(_,i)=>{
            const day=i+1;
            const {pct,date}=getDateAdh(day);
            const isToday=date===getDateStr();
            const isSel=date===selected;
            const cls=getAdherenceColorClass(pct);
            return(
              <div key={day} onClick={()=>setSelected(isSel?null:date)}
                className={`calendar-day ${cls} ${isToday?'ring-2 ring-indigo-400 ring-offset-1':''} ${isSel?'scale-110':''}`}>
                {day}
              </div>
            );
          })}
        </div>
        {/* Legend */}
        <div className="flex gap-4 justify-center mt-4 text-xs text-gray-500">
          <span className="flex items-center gap-1"><span className="w-3 h-3 rounded-full bg-green-500 inline-block"/>100%</span>
          <span className="flex items-center gap-1"><span className="w-3 h-3 rounded-full bg-yellow-400 inline-block"/>جزئي</span>
          <span className="flex items-center gap-1"><span className="w-3 h-3 rounded-full bg-red-500 inline-block"/>0%</span>
          <span className="flex items-center gap-1"><span className="w-3 h-3 rounded-full bg-gray-200 inline-block"/>-</span>
        </div>
      </Card>

      {/* Selected day detail */}
      {selected&&(
        <Card className="p-4 fade-in mb-5">
          <h3 className="font-bold text-gray-700 mb-3">{selected}</h3>
          {selectedDoses.length===0?(
            <p className="text-gray-400 text-sm">{t.noData}</p>
          ):(
            <div className="flex flex-col gap-2">
              {selectedDoses.map(dose=>{
                const med=state.medications.find(m=>m.id===dose.medicationId);
                if(!med)return null;
                return(
                  <div key={dose.id} className="flex items-center justify-between py-1.5 border-b border-gray-50 last:border-0">
                    <div className="flex items-center gap-2">
                      <div className="w-2.5 h-2.5 rounded-full" style={{background:med.color}}/>
                      <div>
                        <p className="text-sm font-semibold text-gray-700">{med.name}</p>
                        <p className="text-xs text-gray-400">{formatTime(dose.scheduledAt.slice(11,16))}</p>
                      </div>
                    </div>
                    <span className={`text-xs px-2 py-1 rounded-full font-semibold
                      ${dose.takenAt?'bg-green-100 text-green-700':dose.skipped?'bg-gray-100 text-gray-500':'bg-red-100 text-red-600'}`}>
                      {dose.takenAt?'✅ أُخذ':dose.skipped?'⏭️ تخطي':'❌ فائت'}
                    </span>
                  </div>
                );
              })}
            </div>
          )}
        </Card>
      )}
    </div>
  );
}

// ─── REPORTS PAGE ──────────────────────────────────────────
function ReportsPage(){
  const {state}=useApp();
  const t=useT();
  const chartRef=useRef(null);
  const chartRef2=useRef(null);
  const chartInst=useRef(null);
  const chartInst2=useRef(null);

  const myMeds=state.medications.filter(m=>m.patientId===state.currentUser.id);
  const myDoses=state.doses.filter(d=>d.patientId===state.currentUser.id);
  const last7=getLast7Days();
  const last4Weeks=getLast4Weeks();

  const weeklyData=last7.map(d=>{const p=calcAdherence(myDoses,d);return p===null?0:p;});
  const weeklyLabels=last7.map(d=>t.weekdays[new Date(d+' 12:00').getDay()]);

  const monthlyData=last4Weeks.map(week=>{
    const pcts=week.map(d=>calcAdherence(myDoses,d)).filter(p=>p!==null);
    return pcts.length?Math.round(pcts.reduce((a,b)=>a+b,0)/pcts.length):0;
  });

  const medAdh=myMeds.map(m=>{
    const d=myDoses.filter(x=>x.medicationId===m.id);
    const p=d.length?Math.round((d.filter(x=>x.takenAt).length/d.length)*100):0;
    return{name:m.name,pct:p,color:m.color};
  });

  // Last week vs this week
  const thisWeekAvg=weeklyData.slice(0,7).reduce((a,b)=>a+b,0)/7;
  const prevWeek=last4Weeks[2].map(d=>{const p=calcAdherence(myDoses,d);return p===null?0:p;});
  const prevWeekAvg=prevWeek.reduce((a,b)=>a+b,0)/7;
  const diff=Math.round(thisWeekAvg-prevWeekAvg);

  useEffect(()=>{
    if(!chartRef.current)return;
    if(chartInst.current)chartInst.current.destroy();
    chartInst.current=new Chart(chartRef.current,{
      type:'bar',
      data:{
        labels:weeklyLabels,
        datasets:[{
          label:t.adherence+' %',
          data:weeklyData,
          backgroundColor:weeklyData.map(p=>p===100?'#22c55e':p>0?'#f59e0b':'#ef4444'),
          borderRadius:8,
        }]
      },
      options:{
        responsive:true,scales:{y:{beginAtZero:true,max:100,grid:{color:'#f1f5f9'}}},
        plugins:{legend:{display:false}},
        animation:{duration:800}
      }
    });
  },[myDoses.length]);

  useEffect(()=>{
    if(!chartRef2.current||!medAdh.length)return;
    if(chartInst2.current)chartInst2.current.destroy();
    chartInst2.current=new Chart(chartRef2.current,{
      type:'doughnut',
      data:{
        labels:medAdh.map(m=>m.name),
        datasets:[{data:medAdh.map(m=>m.pct),backgroundColor:medAdh.map(m=>m.color),borderWidth:2}]
      },
      options:{responsive:true,plugins:{legend:{position:'bottom'}}}
    });
  },[myMeds.length]);

  const exportCSV=()=>{
    const rows=[['التاريخ','نسبة الالتزام','الجرعات المأخوذة','الجرعات الكلية']];
    const dates=[...new Set(myDoses.map(d=>d.scheduledAt.slice(0,10)))].sort();
    dates.forEach(date=>{
      const day=myDoses.filter(d=>d.scheduledAt.startsWith(date));
      const taken=day.filter(d=>d.takenAt).length;
      const pct=day.length?Math.round((taken/day.length)*100):0;
      rows.push([date,`${pct}%`,taken,day.length]);
    });
    const csv=rows.map(r=>r.join(',')).join('\n');
    const blob=new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download='meditrack_report.csv';a.click();
  };

  const streak=calcStreak(myDoses,state.currentUser.id);
  const points=calcPoints(myDoses,state.currentUser.id);
  const totalTaken=myDoses.filter(d=>d.takenAt).length;
  const overall=myDoses.length?Math.round((totalTaken/myDoses.length)*100):0;

  return(
    <div className="fade-in">
      <div className="flex items-center justify-between mb-5">
        <h1 className="text-xl font-bold text-gray-800">{t.reports}</h1>
        <Btn variant="outline" size="sm" onClick={exportCSV}>{t.exportCSV}</Btn>
      </div>

      {/* Summary cards */}
      <div className="grid grid-cols-2 gap-3 mb-5">
        <StatCard icon="📊" label="الالتزام الكلي" value={`${overall}%`} color={overall>=80?'green':overall>=50?'yellow':'red'}/>
        <StatCard icon="🔥" label={t.streak} value={`${streak} ${t.days}`} color="yellow"/>
        <StatCard icon="⭐" label={t.points} value={points} color="indigo"/>
        <StatCard icon="💊" label="جرعات مُسجّلة" value={totalTaken} color="blue"/>
      </div>

      {/* Week comparison */}
      <Card className="p-4 mb-5">
        <h3 className="font-bold text-gray-700 mb-3 text-sm">{t.comparisonTitle}</h3>
        <div className="flex items-center gap-4">
          <div className="text-center">
            <p className="text-xs text-gray-400">الأسبوع الماضي</p>
            <p className="text-xl font-bold text-gray-700">{Math.round(prevWeekAvg)}%</p>
          </div>
          <div className={`flex-1 text-center py-2 px-4 rounded-xl font-bold text-sm
            ${diff>0?'bg-green-50 text-green-700':diff<0?'bg-red-50 text-red-600':'bg-gray-50 text-gray-600'}`}>
            {diff>0?`${t.improvement} +${diff}%`:diff<0?`${t.declined} ${diff}%`:t.same}
          </div>
          <div className="text-center">
            <p className="text-xs text-gray-400">هذا الأسبوع</p>
            <p className="text-xl font-bold text-gray-700">{Math.round(thisWeekAvg)}%</p>
          </div>
        </div>
      </Card>

      {/* Weekly bar chart */}
      <Card className="p-4 mb-5">
        <h3 className="font-bold text-gray-700 mb-3 text-sm">{t.weeklyAdherence}</h3>
        <canvas ref={chartRef} height={180}/>
      </Card>

      {/* Medication adherence donut */}
      {medAdh.length>0&&(
        <Card className="p-4 mb-5">
          <h3 className="font-bold text-gray-700 mb-3 text-sm">{t.adherenceByMed}</h3>
          <canvas ref={chartRef2} height={180}/>
          <div className="mt-3 flex flex-col gap-2">
            {medAdh.map(m=>(
              <div key={m.name} className="flex items-center gap-2">
                <div className="w-3 h-3 rounded-full flex-shrink-0" style={{background:m.color}}/>
                <span className="text-sm text-gray-700 flex-1">{m.name}</span>
                <div className="flex items-center gap-2">
                  <div className="w-24 bg-gray-100 rounded-full h-1.5">
                    <div className="h-1.5 rounded-full progress-bar" style={{width:`${m.pct}%`,background:m.color}}/>
                  </div>
                  <span className="text-xs font-bold text-gray-600 w-10 text-end">{m.pct}%</span>
                </div>
              </div>
            ))}
          </div>
        </Card>
      )}

      {/* Achievements */}
      <Card className="p-4 mb-5">
        <h3 className="font-bold text-gray-700 mb-3 text-sm">{t.achievements}</h3>
        <div className="grid grid-cols-2 gap-2">
          {ACHIEVEMENTS_DEF.map(a=>{
            const unlocked=(a.id==='first_dose'&&totalTaken>0)||(a.id==='streak_7'&&streak>=7)||(a.id==='streak_30'&&streak>=30)||(a.id==='points_100'&&points>=100)||(a.id==='streak_100'&&streak>=100);
            return(
              <div key={a.id} className={`flex items-center gap-2 p-3 rounded-xl ${unlocked?'bg-yellow-50 border border-yellow-200':'bg-gray-50 opacity-50'}`}>
                <span className="text-2xl">{a.icon}</span>
                <div>
                  <p className="text-xs font-bold text-gray-700">{state.language==='ar'?a.titleAr:a.titleEn}</p>
                  {unlocked&&<p className="text-[10px] text-yellow-600">✓ مكتسب</p>}
                </div>
              </div>
            );
          })}
        </div>
      </Card>
    </div>
  );
}

// ─── SETTINGS PAGE ─────────────────────────────────────────
function SettingsPage(){
  const {state,dispatch}=useApp();
  const t=useT();
  const [notifEnabled,setNotifEnabled]=useState(false);

  useEffect(()=>{
    if('Notification' in window)setNotifEnabled(Notification.permission==='granted');
  },[]);

  const requestNotif=async()=>{
    if('Notification' in window){
      const p=await Notification.requestPermission();
      setNotifEnabled(p==='granted');
      if(p==='granted')new Notification('MediTrack 💊',{body:'الإشعارات مفعّلة! سنذكّرك بجرعاتك 🔔'});
    }
  };

  const clearData=()=>{
    if(confirm('هل تريد مسح جميع البيانات؟')){{
      localStorage.removeItem('meditrack_v2');location.reload();
    }}
  };

  return(
    <div className="fade-in">
      <h1 className="text-xl font-bold text-gray-800 mb-5">{t.settings}</h1>

      <div className="flex flex-col gap-3">
        {/* Language */}
        <Card className="p-4">
          <div className="flex items-center justify-between">
            <div>
              <p className="font-semibold text-gray-800">🌐 {t.language}</p>
              <p className="text-xs text-gray-400">{state.language==='ar'?'العربية':'English'}</p>
            </div>
            <button onClick={()=>dispatch({type:'SET_LANG',lang:state.language==='ar'?'en':'ar'})}
              className="px-4 py-2 bg-indigo-50 text-indigo-600 rounded-xl text-sm font-semibold hover:bg-indigo-100 transition-all">
              {state.language==='ar'?'English':'العربية'}
            </button>
          </div>
        </Card>

        {/* Dark mode */}
        <Card className="p-4">
          <div className="flex items-center justify-between">
            <div>
              <p className="font-semibold text-gray-800">🌙 {t.darkMode}</p>
              <p className="text-xs text-gray-400">{state.darkMode?'مفعّل':'معطّل'}</p>
            </div>
            <div onClick={()=>dispatch({type:'SET_DARK',val:!state.darkMode})}
              className={`w-12 h-6 rounded-full transition-all cursor-pointer ${state.darkMode?'bg-indigo-500':'bg-gray-300'} relative`}>
              <div className={`w-5 h-5 bg-white rounded-full shadow absolute top-0.5 transition-all ${state.darkMode?'end-0.5':'start-0.5'}`}/>
            </div>
          </div>
        </Card>

        {/* Notifications */}
        <Card className="p-4">
          <div className="flex items-center justify-between">
            <div>
              <p className="font-semibold text-gray-800">🔔 {t.notifications}</p>
              <p className="text-xs text-gray-400">{notifEnabled?t.notificationsEnabled:t.notificationsDisabled}</p>
            </div>
            <Btn variant={notifEnabled?'success':'outline'} size="sm" onClick={requestNotif}>
              {notifEnabled?'✅ مفعّل':'تفعيل'}
            </Btn>
          </div>
        </Card>

        {/* Account info */}
        <Card className="p-4">
          <p className="font-semibold text-gray-800 mb-3">👤 معلومات الحساب</p>
          <div className="flex flex-col gap-1 text-sm text-gray-600">
            <p><span className="font-semibold">الاسم:</span> {state.currentUser?.name}</p>
            <p><span className="font-semibold">البريد:</span> {state.currentUser?.email}</p>
            <p><span className="font-semibold">الدور:</span> {state.currentUser?.role==='doctor'?t.doctor:t.patient}</p>
          </div>
        </Card>

        {/* App info */}
        <Card className="p-4">
          <p className="font-semibold text-gray-800 mb-2">ℹ️ عن التطبيق</p>
          <p className="text-sm text-gray-500">MediTrack v1.0 - إدارة الالتزام الدوائي الذكية</p>
          <p className="text-xs text-gray-400 mt-1">جميع البيانات محفوظة محليًا على جهازك</p>
        </Card>

        <Btn variant="danger" onClick={clearData} className="w-full">🗑️ مسح جميع البيانات</Btn>
        <Btn variant="ghost" onClick={()=>dispatch({type:'LOGOUT'})} className="w-full">🚪 {t.logout}</Btn>
      </div>
    </div>
  );
}

// ─── DOCTOR VIEW ───────────────────────────────────────────
function DoctorPage(){
  const {state,dispatch}=useApp();
  const t=useT();
  const [selectedPatient,setSelectedPatient]=useState(null);
  const [noteText,setNoteText]=useState('');
  const [showAddPatient,setShowAddPatient]=useState(false);

  const allPatients=state.patients.filter(p=>p.role==='patient');

  const getPatientStats=patientId=>{
    const doses=state.doses.filter(d=>d.patientId===patientId);
    const today=getDateStr();
    const todayPct=calcAdherence(doses,today);
    const streak=calcStreak(doses,patientId);
    const last7=getLast7Days();
    const weekPcts=last7.map(d=>calcAdherence(doses,d)).filter(p=>p!==null);
    const weekAvg=weekPcts.length?Math.round(weekPcts.reduce((a,b)=>a+b,0)/weekPcts.length):0;
    const meds=state.medications.filter(m=>m.patientId===patientId);
    return{todayPct,streak,weekAvg,medsCount:meds.length};
  };

  return(
    <div className="fade-in">
      <h1 className="text-xl font-bold text-gray-800 mb-2">{t.doctorView}</h1>
      <p className="text-sm text-gray-500 mb-5">مرحباً د. {state.currentUser.name}</p>

      {/* Summary */}
      <div className="grid grid-cols-2 gap-3 mb-5">
        <StatCard icon="👥" label={t.patients} value={allPatients.length} color="indigo"/>
        <StatCard icon="✅" label="ملتزمون اليوم" value={allPatients.filter(p=>{const s=getPatientStats(p.id);return s.todayPct===100;}).length} color="green"/>
      </div>

      {/* Patients list */}
      <div className="flex flex-col gap-3">
        {allPatients.map(patient=>{
          const stats=getPatientStats(patient.id);
          const color=getAdherenceColor(stats.todayPct);
          const colorCls=color==='green'?'border-green-400 bg-green-50':color==='yellow'?'border-yellow-400 bg-yellow-50':color==='red'?'border-red-400 bg-red-50':'border-gray-200 bg-gray-50';
          return(
            <Card key={patient.id} className={`p-4 border-2 cursor-pointer hover:shadow-md transition-all ${colorCls}`}
              onClick={()=>setSelectedPatient(selectedPatient?.id===patient.id?null:patient)}>
              <div className="flex items-center justify-between">
                <div className="flex items-center gap-3">
                  <div className="w-10 h-10 rounded-full bg-white flex items-center justify-center text-lg font-bold text-indigo-600 shadow-sm">
                    {(patient.name||'P')[0]}
                  </div>
                  <div>
                    <p className="font-bold text-gray-800">{patient.name}</p>
                    <p className="text-xs text-gray-500">{patient.diagnosis}</p>
                    <p className="text-xs text-gray-400">{patient.email}</p>
                  </div>
                </div>
                <div className="text-end">
                  <AdherenceBadge pct={stats.todayPct}/>
                  <p className="text-xs text-gray-400 mt-1">أسبوع: {stats.weekAvg}%</p>
                  <p className="text-xs text-gray-400">سلسلة: {stats.streak} يوم</p>
                </div>
              </div>

              {selectedPatient?.id===patient.id&&(
                <div className="mt-4 pt-4 border-t border-gray-200 fade-in">
                  {/* Patient's meds */}
                  <p className="font-semibold text-sm text-gray-700 mb-2">الأدوية ({stats.medsCount})</p>
                  {state.medications.filter(m=>m.patientId===patient.id).map(med=>{
                    const adh=getMedAdh(med.id,state.doses);
                    return(
                      <div key={med.id} className="flex items-center gap-2 py-1">
                        <div className="w-2 h-2 rounded-full" style={{background:med.color}}/>
                        <span className="text-sm text-gray-700">{med.name}</span>
                        <span className="text-xs text-gray-400">{med.dosage}</span>
                        <AdherenceBadge pct={adh}/>
                      </div>
                    );
                  })}

                  {/* Last 7 days */}
                  <p className="font-semibold text-sm text-gray-700 mt-3 mb-2">آخر 7 أيام</p>
                  <div className="flex items-end gap-1 h-12">
                    {getLast7Days().map((date,i)=>{
                      const p=calcAdherence(state.doses.filter(d=>d.patientId===patient.id),date);
                      const color=p===100?'bg-green-500':p>0?'bg-yellow-400':p===0?'bg-red-400':'bg-gray-200';
                      const h=p!==null?Math.max(4,p*0.48):4;
                      return<div key={date} className={`flex-1 ${color} rounded-t`} style={{height:`${h}px`}} title={`${date}: ${p}%`}/>;
                    })}
                  </div>

                  {/* Send note */}
                  <div className="mt-3 flex gap-2">
                    <input value={noteText} onChange={e=>setNoteText(e.target.value)}
                      placeholder="إرسال ملاحظة للمريض..."
                      className="flex-1 border border-gray-300 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400"/>
                    <Btn size="sm" onClick={()=>{
                      dispatch({type:'SHOW_TOAST',msg:`✅ تم إرسال الملاحظة إلى ${patient.name}`});
                      setNoteText('');
                    }}>{t.sendNote}</Btn>
                  </div>
                </div>
              )}
            </Card>
          );
        })}
      </div>

      {allPatients.length===0&&(
        <div className="text-center py-12 text-gray-400">
          <p className="text-4xl mb-3">👥</p>
          <p>{t.noData}</p>
        </div>
      )}
    </div>
  );
}

// ─── MAIN APP ──────────────────────────────────────────────
function PageWrapper({children}){
  return(
    <div className="md:ms-56">
      <div className="pt-16 md:pt-0 pb-20 md:pb-6 px-4 md:px-6 max-w-2xl mx-auto min-h-screen">
        {children}
      </div>
    </div>
  );
}

function App(){
  const {state}=useApp();
  const page=state.page;

  if(!state.currentUser){
    if(page==='register')return<RegisterPage/>;
    return<LoginPage/>;
  }

  const renderPage=()=>{
    switch(page){
      case 'dashboard':return<DashboardPage/>;
      case 'medications':return<MedicationsPage/>;
      case 'history':return<HistoryPage/>;
      case 'reports':return<ReportsPage/>;
      case 'profile':return<ProfilePage/>;
      case 'settings':return<SettingsPage/>;
      case 'doctor':return<DoctorPage/>;
      default:return<DashboardPage/>;
    }
  };

  return(
    <>
      <Navbar/>
      <PageWrapper>{renderPage()}</PageWrapper>
      <Toast/>
    </>
  );
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<AppProvider><App/></AppProvider>);
</script>
